<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevScroll</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --black: #000000;
            --surface-1: #0a0a0a;
            --surface-2: #121212;
            --surface-3: #1c1c1c;
            --border: #262626;
            --border-light: #363636;
            --text-primary: #f5f5f5;
            --text-secondary: #a8a8a8;
            --text-muted: #4a4a4a;
            --insta-1: #833ab4;
            --insta-2: #fd1d1d;
            --insta-3: #fcb045;
            --insta-grad: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            --green: #00d4aa;
            --red: #ff4757;
            --orange: #ffb347;
            --blue: #0095f6;
            --purple: #833ab4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--black);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, h6 { letter-spacing: -0.02em; }
        p, span, div, textarea { letter-spacing: -0.01em; }

        /* --- SCREEN 1: CHIP SELECTOR --- */
        #screen-1 {
            position: absolute;
            inset: 0;
            background: var(--black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            transition: 0.4s cubic-bezier(0.22,1,0.36,1);
            z-index: 50;
        }

        .s1-inner {
            width: 100%;
            max-width: 390px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 48px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--insta-grad);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: var(--insta-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .logo-sub {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
            align-self: flex-start;
            margin-bottom: 14px;
        }

        .chip-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            margin-bottom: 36px;
        }

        .chip {
            height: 80px;
            border-radius: 16px;
            background: linear-gradient(var(--surface-2), var(--surface-2)) padding-box,
                        var(--border) border-box;
            border: 1.5px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
            user-select: none;
        }

        .chip i {
            stroke: var(--text-secondary);
            stroke-width: 1.5;
            transition: stroke 0.15s ease;
        }

        .chip-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.15s ease;
        }

        .chip.selected {
            background: linear-gradient(var(--surface-2), var(--surface-2)) padding-box,
                        var(--insta-grad) border-box;
        }

        .chip.selected i { stroke: white; }
        .chip.selected .chip-label { color: var(--text-primary); }
        .chip:active { transform: scale(0.93); }
        
        .chip.dimmed {
            opacity: 0.4;
            pointer-events: none;
        }

        .cta-btn {
            width: 100%;
            height: 52px;
            border-radius: 14px;
            background: var(--insta-grad);
            border: none;
            color: white;
            font: 600 15px/1 'Inter', sans-serif;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.3;
            pointer-events: none;
            cursor: not-allowed;
            transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
        }

        .cta-btn.active {
            opacity: 1;
            pointer-events: all;
            cursor: pointer;
        }
        .cta-btn.active:active { transform: scale(0.98); }

        .loading-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            justify-content: center;
        }

        .ldot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: white;
            animation: ldotPulse 0.9s infinite;
        }
        .ldot:nth-child(1) { animation-delay: 0s; }
        .ldot:nth-child(2) { animation-delay: 0.15s; }
        .ldot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes ldotPulse {
            0%, 100% { transform: scale(0.7); opacity: 0.3; }
            50% { transform: scale(1); opacity: 1; }
        }

        /* --- SCREEN 2: THE FEED --- */
        #screen-2 {
            position: absolute;
            inset: 0;
            transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.22,1,0.36,1);
            z-index: 10;
        }

        #progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--insta-grad);
            width: 0%;
            z-index: 200;
            border-radius: 0 2px 2px 0;
            transition: width 0.35s ease;
        }

        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 52px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: var(--insta-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }
        .nav-close:hover { background: rgba(255,255,255,0.15); }
        .nav-close:active { transform: scale(0.88); }

        .feed-container {
            width: 100%;
            height: 100dvh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 56px;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
            padding-bottom: env(safe-area-inset-bottom, 0);
            z-index: 100;
        }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            padding: 6px 0;
            transition: all 0.15s;
        }

        .nav-tab i {
            stroke: var(--text-muted);
            stroke-width: 1.5;
            transition: stroke 0.15s;
        }

        .nav-tab-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            transition: color 0.15s;
        }

        .nav-tab.active i { stroke: white; }
        .nav-tab.active .nav-tab-label { color: white; }
        .nav-tab:active { transform: scale(0.84); }

        /* --- SKELETON LOADER --- */
        .skeleton-card {
            width: 100%;
            height: 100dvh;
            scroll-snap-align: start;
            background: var(--surface-1);
            padding: 80px 16px 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
        }

        @keyframes shimmer {
            0%   { background-position: -400px 0 }
            100% { background-position: 400px 0 }
        }

        .skel {
            background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
            background-size: 800px 100%;
            animation: shimmer 1.6s infinite linear;
            border-radius: 8px;
        }

        .skel-emoji { width: 48px; height: 48px; border-radius: 12px; margin-bottom: 16px; }
        .skel-t1 { height: 26px; width: 72%; margin-bottom: 8px; }
        .skel-t2 { height: 26px; width: 45%; margin-bottom: 18px; }
        .skel-b1 { height: 14px; width: 88%; margin-bottom: 8px; }
        .skel-b2 { height: 14px; width: 65%; margin-bottom: 22px; }
        .skel-action { height: 72px; border-radius: 12px; margin-bottom: 16px; width: calc(100% - 64px); }
        .skel-btn-group { display: flex; gap: 10px; width: calc(100% - 64px); }
        .skel-btn1 { flex: 1; height: 42px; border-radius: 10px; }
        .skel-btn2 { flex: 2; height: 42px; border-radius: 10px; }

        /* --- FEED CARD STRUCUTURE --- */
        .feed-card {
            width: 100%;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            overflow: hidden;
        }

        .card-bg-solid { position: absolute; inset: 0; background: #0d0d0d; }

        .card-bg-glow { position: absolute; inset: 0; }
        .card-type-insight .card-bg-glow { background: radial-gradient(ellipse 70% 50% at 85% 15%, rgba(131,58,180,0.22) 0%, transparent 60%); }
        .card-type-repo .card-bg-glow { background: radial-gradient(ellipse 70% 50% at 85% 15%, rgba(0,212,170,0.18) 0%, transparent 60%); }
        .card-type-challenge .card-bg-glow { background: radial-gradient(ellipse 70% 50% at 85% 15%, rgba(255,71,87,0.18) 0%, transparent 60%); }
        .card-type-pattern .card-bg-glow { background: radial-gradient(ellipse 70% 50% at 85% 15%, rgba(255,179,71,0.18) 0%, transparent 60%); }

        .card-inner {
            position: absolute;
            left: 16px;
            right: 72px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 0;
            z-index: 10;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-tag {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 11px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            color: var(--text-primary);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .card-type-badge {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.01em;
            padding: 5px 10px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge-insight { background: rgba(131,58,180,0.2); color: #c084fc; border: 1px solid rgba(131,58,180,0.35); }
        .badge-repo { background: rgba(0,212,170,0.15); color: #00d4aa; border: 1px solid rgba(0,212,170,0.3); }
        .badge-challenge { background: rgba(255,71,87,0.15); color: #ff6b78; border: 1px solid rgba(255,71,87,0.3); }
        .badge-pattern { background: rgba(255,179,71,0.15); color: #ffb347; border: 1px solid rgba(255,179,71,0.3); }

        .card-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.15;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .card-body {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .card-action-block {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 16px;
        }

        .action-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .action-code {
            font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Consolas, monospace;
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
            line-height: 1.5;
        }

        .card-buttons { display: flex; gap: 10px; }

        .btn-secondary {
            flex: 1;
            height: 42px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            font: 600 13px/1 'Inter', sans-serif;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-secondary:active { transform: scale(0.94); }

        .btn-primary {
            flex: 2;
            height: 42px;
            border-radius: 10px;
            background: var(--insta-grad);
            border: none;
            color: white;
            font: 600 13px/1 'Inter', sans-serif;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-primary:active { transform: scale(0.94); }

        /* SIDE ACTIONS */
        .side-actions {
            position: absolute;
            right: 12px;
            bottom: 88px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            align-items: center;
            z-index: 10;
        }

        .side-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .side-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .side-btn span {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
        }

        .side-btn:active .side-icon { transform: scale(0.84); }

        .side-btn.liked .side-icon {
            background: rgba(255,71,87,0.15);
            border-color: rgba(255,71,87,0.35);
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* --- REFLECTION LOCK OVERLAY --- */
        #reflection-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 28px;
            transition: opacity 0.35s ease;
            opacity: 0;
            pointer-events: none;
        }

        #reflection-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .ref-inner { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 340px; }

        .lock-block {
            width: 64px;
            height: 64px;
            background: rgba(131,58,180,0.15);
            border: 1.5px solid rgba(131,58,180,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            animation: lockFloat 2.5s ease-in-out infinite;
        }

        @keyframes lockFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .ref-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 8px;
        }

        .ref-sub {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.55;
            margin-bottom: 32px;
        }

        .timer-wrap { position: relative; width: 80px; height: 80px; margin-bottom: 28px; }
        .timer-svg { transform: rotate(-90deg); }
        .timer-track { fill: none; stroke: var(--border); stroke-width: 3.5; }
        .timer-prog {
            fill: none;
            stroke: url(#timerGrad);
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-dasharray: 213.6;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-num {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-primary);
        }

        .ref-area {
            width: 100%;
            min-height: 108px;
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            color: var(--text-primary);
            font: 400 14px/1.55 'Inter', sans-serif;
            resize: none;
            outline: none;
            transition: border-color 0.2s ease;
            margin-bottom: 10px;
        }
        .ref-area::placeholder { color: var(--text-muted); }
        .ref-area:focus { border-color: #833ab4; }

        .char-count {
            width: 100%;
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .char-count.ready { color: var(--green); font-weight: 600; }

        .unlock-btn {
            width: 100%;
            height: 52px;
            border-radius: 14px;
            border: none;
            font: 700 15px/1 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            cursor: not-allowed;
            background: var(--surface-3);
            color: var(--text-muted);
        }

        .unlock-btn.ready { background: var(--insta-grad); color: white; cursor: pointer; }
        .unlock-btn.ready:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <!-- SCREEN 1 -->
    <div id="screen-1">
        <div class="s1-inner">
            <div class="logo-block">
                <div class="logo-icon">
                    <i data-lucide="zap" width="24" height="24" stroke="white"></i>
                </div>
                <div class="logo-text">DevScroll</div>
                <div class="logo-sub">Your feed. Your stack. No noise.</div>
            </div>

            <div class="section-label">CHOOSE YOUR STACK</div>

            <div class="chip-grid">
                <div class="chip" data-chip="React">
                    <i data-lucide="atom" width="24" height="24"></i>
                    <span class="chip-label">React</span>
                </div>
                <div class="chip" data-chip="Python">
                    <i data-lucide="code-2" width="24" height="24"></i>
                    <span class="chip-label">Python</span>
                </div>
                <div class="chip" data-chip="DSA">
                    <i data-lucide="brain" width="24" height="24"></i>
                    <span class="chip-label">DSA</span>
                </div>
                <div class="chip" data-chip="AI/ML">
                    <i data-lucide="cpu" width="24" height="24"></i>
                    <span class="chip-label">AI / ML</span>
                </div>
                <div class="chip" data-chip="System Design">
                    <i data-lucide="layout-dashboard" width="24" height="24"></i>
                    <span class="chip-label">Sys Design</span>
                </div>
                <div class="chip" data-chip="DevOps">
                    <i data-lucide="cloud" width="24" height="24"></i>
                    <span class="chip-label">DevOps</span>
                </div>
            </div>

            <button id="ctaBtn" class="cta-btn">
                <span>Build My Feed</span>
                <i data-lucide="arrow-right" width="18" height="18" stroke="white"></i>
            </button>
        </div>
    </div>

    <!-- SCREEN 2 -->
    <div id="screen-2">
        <div id="progress-bar"></div>
        <div class="navbar">
            <div class="nav-logo">DevScroll</div>
            <div class="nav-close" onclick="location.reload()">
                <i data-lucide="x" width="16" height="16" stroke="white"></i>
            </div>
        </div>
        <div class="feed-container" id="feedContainer"></div>
        <div class="bottom-nav">
            <div class="nav-tab active">
                <i data-lucide="home" width="20" height="20"></i>
                <span class="nav-tab-label">Feed</span>
            </div>
            <div class="nav-tab">
                <i data-lucide="search" width="20" height="20"></i>
                <span class="nav-tab-label">Explore</span>
            </div>
            <div class="nav-tab">
                <i data-lucide="flame" width="20" height="20"></i>
                <span class="nav-tab-label">Streak</span>
            </div>
            <div class="nav-tab">
                <i data-lucide="user" width="20" height="20"></i>
                <span class="nav-tab-label">Profile</span>
            </div>
        </div>
    </div>

    <!-- REFLECTION LOCK OVERLAY -->
    <div id="reflection-overlay">
        <div class="ref-inner">
            <div class="lock-block">
                <i data-lucide="lock" width="28" height="28" stroke="#c084fc"></i>
            </div>
            <h2 class="ref-title">What did you just learn?</h2>
            <div class="ref-sub">Type at least 20 characters to unlock your feed.</div>
            
            <div class="timer-wrap">
                <svg class="timer-svg" width="80" height="80" viewBox="0 0 80 80">
                    <defs>
                        <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#833ab4"/>
                            <stop offset="50%" stop-color="#fd1d1d"/>
                            <stop offset="100%" stop-color="#fcb045"/>
                        </linearGradient>
                    </defs>
                    <circle class="timer-track" cx="40" cy="40" r="34"></circle>
                    <circle class="timer-prog" id="timerProg" cx="40" cy="40" r="34"></circle>
                </svg>
                <div class="timer-num" id="timerNum">60</div>
            </div>

            <textarea id="refArea" class="ref-area" placeholder="Start typing..."></textarea>
            <div id="charCount" class="char-count">0 / 20</div>

            <button id="unlockBtn" class="unlock-btn">
                <i data-lucide="lock" width="18" height="18" id="unlockIcon"></i>
                <span id="unlockText">Type to unlock</span>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        // MOCK DATA
        const MOCK_CARDS = [
            { id:1, type:"insight", title:"React 19 Compiler Changes Everything", body:"Auto-memoization is now built-in at the compiler level. useCallback and useMemo are effectively obsolete for most use cases.", tag:"React", next_action:"npx create-react-app@latest --template typescript" },
            { id:2, type:"repo", title:"shadcn/ui just crossed 100k stars", body:"Copy-paste components with zero dependency lock-in. You own the code completely the moment you paste it into your project.", tag:"React", next_action:"npx shadcn@latest init" },
            { id:3, type:"challenge", title:"Explain Two Sum Without Looking It Up", body:"Don't just solve it. Explain the hashmap O(n) trick to someone who has never seen it. Time yourself: 30 seconds.", tag:"DSA", next_action:"leetcode.com/problems/two-sum" },
            { id:4, type:"pattern", title:"Rate Limiting: Token Bucket vs Sliding Window", body:"Token bucket handles bursts gracefully. Sliding window is strict. Stripe uses token bucket in production — know why.", tag:"System Design", next_action:"Read: stripe.com/blog/rate-limiters" },
            { id:5, type:"insight", title:"uv is Replacing pip Everywhere", body:"Written in Rust, 100x faster than pip. Drop-in replacement with identical CLI. No reason not to switch today.", tag:"Python", next_action:"pip install uv && uv pip install requests" },
            { id:6, type:"repo", title:"Karpathy Released LLM.c", body:"GPT-2 trained in under 1000 lines of pure C. No PyTorch, no abstractions. The most educational ML repo ever written.", tag:"AI/ML", next_action:"github.com/karpathy/llm.c" },
            { id:7, type:"challenge", title:"Git Rebase Without Googling", body:"Not what it does — explain when and why you would choose rebase over merge. Hint: it is about a clean linear history.", tag:"DevOps", next_action:"git rebase -i HEAD~3" },
            { id:8, type:"pattern", title:"Async/Await is Syntactic Sugar", body:"Under the hood it compiles to .then() promise chains. If you do not understand Promises deeply, async/await will trip you.", tag:"React", next_action:"mdn.io/async-function" },
            { id:9, type:"insight", title:"Docker Explained in Three Sentences", body:"Image is a snapshot of your app and its environment. Container is that snapshot running as a process. Registry is where images live.", tag:"DevOps", next_action:"docker run hello-world" },
            { id:10, type:"challenge", title:"Ship a CLI Tool to npm Today", body:"One script. Reads input, produces output, has a --help flag. Forces you to think about real interfaces and distribution.", tag:"Python", next_action:"npm init && echo '#!/usr/bin/env node' > index.js" }
        ];

        async function createSession(selectedTags) {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve({ session_id: 'session-' + Date.now(), cards: MOCK_CARDS });
                }, 1200);
            });
        }

        async function saveReflection(sessionId, cardIndex, text) {
            return new Promise(resolve => setTimeout(resolve, 300));
        }

        let selectedChips = new Set();
        let feedData = [];
        let sessionId = null;
        let lastScrollIndex = 0;
        let scrollCount = 0;
        let timerItv = null;
        let timerSeconds = 60;
        
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('.chip');
            const ctaBtn = document.getElementById('ctaBtn');

            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const val = chip.getAttribute('data-chip');
                    if (selectedChips.has(val)) {
                        selectedChips.delete(val);
                        chip.classList.remove('selected');
                    } else {
                        if (selectedChips.size < 3) {
                            selectedChips.add(val);
                            chip.classList.add('selected');
                        }
                    }

                    if (selectedChips.size === 3) {
                        chips.forEach(c => {
                            if (!c.classList.contains('selected')) c.classList.add('dimmed');
                        });
                    } else {
                        chips.forEach(c => c.classList.remove('dimmed'));
                    }

                    if (selectedChips.size > 0) {
                        ctaBtn.classList.add('active');
                    } else {
                        ctaBtn.classList.remove('active');
                    }
                });
            });

            ctaBtn.addEventListener('click', async () => {
                if (!ctaBtn.classList.contains('active')) return;
                
                ctaBtn.innerHTML = '<div class="loading-dots"><span class="ldot"></span><span class="ldot"></span><span class="ldot"></span></div>';
                
                // Show skeletons immediately
                const container = document.getElementById('feedContainer');
                container.innerHTML = 
                    createSkeleton() + createSkeleton() + createSkeleton();
                document.getElementById('screen-1').style.transform = 'translateX(-100%)';
                document.getElementById('screen-1').style.opacity = '0';
                document.getElementById('screen-2').style.transform = 'translateX(0)';
                
                try {
                    const res = await createSession(Array.from(selectedChips));
                    feedData = res.cards;
                    sessionId = res.session_id;

                    feedData.forEach(c => c.likes = Math.floor(Math.random() * 850) + 50);
                    renderFeed(feedData);

                } catch(e) {
                    console.error(e);
                    ctaBtn.innerHTML = '<span>Error</span>';
                }
            });

            const feedContainer = document.getElementById('feedContainer');
            feedContainer.addEventListener('scroll', () => {
                const newIndex = Math.round(feedContainer.scrollTop / window.innerHeight);
                if (newIndex !== lastScrollIndex) {
                    lastScrollIndex = newIndex;
                    scrollCount++;
                    updateProgressBar(newIndex, feedData.length);
                    if (scrollCount % 5 === 0 && scrollCount > 0) {
                        setTimeout(showReflection, 350);
                    }
                }
            }, { passive: true });

            const refArea = document.getElementById('refArea');
            const charCount = document.getElementById('charCount');
            const unlockBtn = document.getElementById('unlockBtn');
            const unlockIcon = document.getElementById('unlockIcon');
            const unlockText = document.getElementById('unlockText');

            refArea.addEventListener('input', () => {
                const len = refArea.value.trim().length;
                charCount.textContent = len + ' / 20';
                if (len >= 20) {
                    charCount.classList.add('ready');
                    unlockBtn.classList.add('ready');
                    unlockIcon.setAttribute('data-lucide', 'lock-open');
                    unlockText.textContent = 'Unlock Feed';
                } else {
                    charCount.classList.remove('ready');
                    unlockBtn.classList.remove('ready');
                    unlockIcon.setAttribute('data-lucide', 'lock');
                    unlockText.textContent = 'Type to unlock';
                }
                lucide.createIcons();
            });

            unlockBtn.addEventListener('click', () => {
                if (unlockBtn.classList.contains('ready')) {
                    unlockAction();
                }
            });
        });

        const iconMap = {
            'insight': 'lightbulb',
            'repo': 'git-branch',
            'challenge': 'zap',
            'pattern': 'layers'
        };

        function createSkeleton() {
            return '<div class="skeleton-card">' +
                '<div class="skel skel-emoji"></div>' +
                '<div class="skel skel-t1"></div>' +
                '<div class="skel skel-t2"></div>' +
                '<div class="skel skel-b1"></div>' +
                '<div class="skel skel-b2"></div>' +
                '<div class="skel skel-action"></div>' +
                '<div class="skel-btn-group">' +
                    '<div class="skel skel-btn1"></div>' +
                    '<div class="skel skel-btn2"></div>' +
                '</div>' +
            '</div>';
        }

        function renderFeed(cards) {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';
            
            cards.forEach((card, i) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'feed-card card-type-' + card.type;
                let iconName = iconMap[card.type] || 'zap';

                cardDiv.innerHTML = 
                    '<div class="card-bg-solid"></div>' +
                    '<div class="card-bg-glow"></div>' +
                    '<div class="card-inner">' +
                        '<div class="card-header">' +
                            '<span class="card-tag">' + card.tag + '</span>' +
                            '<span class="card-type-badge badge-' + card.type + '">' +
                                '<i data-lucide="' + iconName + '" width="13" height="13"></i> ' + card.type +
                            '</span>' +
                        '</div>' +
                        '<div class="card-title">' + card.title + '</div>' +
                        '<div class="card-body">' + card.body + '</div>' +
                        '<div class="card-action-block">' +
                            '<div class="action-label"><i data-lucide="terminal" width="12" height="12"></i> NEXT ACTION</div>' +
                            '<div class="action-code">' + card.next_action + '</div>' +
                        '</div>' +
                        '<div class="card-buttons">' +
                            '<button class="btn-secondary" onclick="markDone(this)">' +
                                '<i data-lucide="check" width="15" height="15"></i> Got it' +
                            '</button>' +
                            '<button class="btn-primary" onclick="copyAction(\'' + card.next_action.replace(/'/g, "\\'") + '\', this)">' +
                                '<i data-lucide="copy" width="15" height="15"></i> Copy' +
                            '</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="side-actions">' +
                        '<div class="side-btn" id="like-' + i + '" onclick="toggleLike(' + i + ', this)">' +
                            '<div class="side-icon">' +
                                '<i data-lucide="heart" width="22" height="22" stroke="white"></i>' +
                            '</div>' +
                            '<span id="like-count-' + i + '">' + card.likes + '</span>' +
                        '</div>' +
                        '<div class="side-btn" onclick="copyAction(\'' + card.next_action.replace(/'/g, "\\'") + '\', null, this)">' +
                            '<div class="side-icon"><i data-lucide="copy" width="22" height="22" stroke="white"></i></div>' +
                            '<span>Copy</span>' +
                        '</div>' +
                        '<div class="side-btn">' +
                            '<div class="side-icon"><i data-lucide="bookmark" width="22" height="22" stroke="white"></i></div>' +
                            '<span>Save</span>' +
                        '</div>' +
                        '<div class="side-btn">' +
                            '<div class="side-icon"><i data-lucide="send" width="22" height="22" stroke="white"></i></div>' +
                            '<span>Share</span>' +
                        '</div>' +
                    '</div>';
                container.appendChild(cardDiv);
            });
            lucide.createIcons();
            updateProgressBar(0, cards.length);
        }

        function updateProgressBar(index, total) {
            const pct = total > 1 ? (index / (total - 1)) * 100 : 0;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        window.toggleLike = function(index, el) {
            const isLiked = el.classList.contains('liked');
            const countEl = document.getElementById('like-count-' + index);
            const iconEl = el.querySelector('.side-icon i');

            // Force reflow
            const sideIcon = el.querySelector('.side-icon');
            sideIcon.style.animation = 'none';
            void sideIcon.offsetWidth; 

            if (isLiked) {
                el.classList.remove('liked');
                countEl.textContent = parseInt(countEl.textContent) - 1;
                iconEl.setAttribute('style', '');
                iconEl.setAttribute('stroke', 'white');
            } else {
                el.classList.add('liked');
                countEl.textContent = parseInt(countEl.textContent) + 1;
                iconEl.setAttribute('style', 'fill:#ff4757; stroke:#ff4757');
                sideIcon.style.animation = 'heartPop 0.3s ease';
            }
        };

        window.copyAction = function(text, primaryBtn, sideBtn) {
            if(navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text);
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); } catch(e) {}
                textArea.remove();
            }

            if (primaryBtn) {
                const orig = primaryBtn.innerHTML;
                primaryBtn.innerHTML = '<i data-lucide="check" width="15" height="15"></i> Copied!';
                lucide.createIcons();
                setTimeout(() => { primaryBtn.innerHTML = orig; lucide.createIcons(); }, 1500);
            }
            if (sideBtn) {
                const span = sideBtn.querySelector('span');
                const orig = span.textContent;
                span.textContent = 'Copied!';
                setTimeout(() => span.textContent = orig, 1500);
            }
        };

        window.markDone = function(btn) {
            btn.innerHTML = '<i data-lucide="check" width="15" height="15"></i> Done!';
            btn.style.borderColor = 'var(--green)';
            btn.style.color = 'var(--green)';
            lucide.createIcons();
        };

        function showReflection() {
            const overlay = document.getElementById('reflection-overlay');
            const refArea = document.getElementById('refArea');
            const charCount = document.getElementById('charCount');
            const timerProg = document.getElementById('timerProg');
            const timerNum = document.getElementById('timerNum');

            refArea.value = '';
            charCount.textContent = '0 / 20';
            charCount.classList.remove('ready');
            
            const unlockBtn = document.getElementById('unlockBtn');
            unlockBtn.classList.remove('ready');
            document.getElementById('unlockText').textContent = 'Type to unlock';
            document.getElementById('unlockIcon').setAttribute('data-lucide', 'lock');
            lucide.createIcons();

            timerSeconds = 60;
            timerNum.textContent = timerSeconds;
            timerProg.style.strokeDashoffset = '0';

            overlay.classList.add('visible');
            setTimeout(() => refArea.focus(), 100);

            if(timerItv) clearInterval(timerItv);
            timerItv = setInterval(() => {
                timerSeconds--;
                timerNum.textContent = timerSeconds;
                timerProg.style.strokeDashoffset = (213.6 / 60) * (60 - timerSeconds);
                if (timerSeconds <= 0) {
                    clearInterval(timerItv);
                    unlockAction(true);
                }
            }, 1000);
        }

        async function unlockAction(timeout = false) {
            const overlay = document.getElementById('reflection-overlay');
            if(timerItv) clearInterval(timerItv);
            
            overlay.classList.remove('visible');
            const text = document.getElementById('refArea').value.trim();
            if (text.length >= 20 || timeout) {
                await saveReflection(sessionId, lastScrollIndex, text);
            }
        }
    </script>
</body>
</html>
